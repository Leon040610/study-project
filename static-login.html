<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能学习计划助手 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1e40af 0%, #0d9488 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .login-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 420px; overflow: hidden; }
    .card-header { background: linear-gradient(135deg, #1e40af 0%, #0d9488 100%); padding: 40px; text-align: center; color: white; }
    .card-header .logo { width: 64px; height: 64px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; font-size: 32px; }
    .card-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .card-header p { opacity: 0.9; font-size: 14px; }
    .card-body { padding: 40px; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-group .input-wrapper { position: relative; }
    .form-group input { width: 100%; padding: 14px 44px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 15px; transition: all 0.3s; outline: none; }
    .form-group input:focus { border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.15); }
    .form-group .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; width: 20px; height: 20px; }
    .btn-primary { width: 100%; background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%); color: white; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30, 64, 175, 0.5); }
    .btn-primary:active { transform: translateY(0); }
    .toggle-link { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #f3f4f6; }
    .toggle-link p { font-size: 14px; color: #6b7280; }
    .toggle-link button { background: none; border: none; color: #1e40af; font-weight: 600; cursor: pointer; font-size: 14px; margin-left: 4px; }
    .toggle-link button:hover { text-decoration: underline; }
    .error-message { background: #fee2e2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: #dc2626; font-size: 13px; margin-bottom: 20px; display: none; }
    .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 18px; }
    .password-toggle:hover { color: #1e40af; }
    .input-field { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #e2e8f0; outline: none; transition: all 0.3s; }
    .input-field:focus { border-color: #1e40af; box-shadow: 0 0 0 2px rgba(30, 64, 175, 0.2); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card-header">
      <div class="logo">📚</div>
      <h1>欢迎回来</h1>
      <p>登录您的学习计划助手</p>
    </div>
    <div class="card-body">
      <div class="error-message" id="error-message"></div>
      <form id="login-form" class="space-y-4">
        <div class="form-group">
          <label>邮箱</label>
          <div class="input-wrapper">
            <span class="icon">📧</span>
            <input type="email" name="email" required placeholder="请输入邮箱地址" class="input-field">
          </div>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="input-wrapper">
            <span class="icon">🔒</span>
            <input type="password" name="password" required placeholder="请输入密码" class="input-field">
            <button type="button" class="password-toggle" id="password-toggle">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">登录</button>
      </form>
      <div class="toggle-link">
        <p>还没有账户？<button id="toggle-register">立即注册</button></p>
      </div>
    </div>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const passwordToggle = document.getElementById('password-toggle');
    const passwordInput = document.querySelector('input[name="password"]');
    const toggleRegister = document.getElementById('toggle-register');
    const errorMessage = document.getElementById('error-message');
    const cardHeader = document.querySelector('.card-header');

    passwordToggle.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      passwordToggle.textContent = type === 'password' ? '👁️' : '🙈';
    });

    let isLogin = true;
    toggleRegister.addEventListener('click', () => {
      isLogin = !isLogin;
      if (isLogin) {
        cardHeader.innerHTML = `
          <div class="logo">📚</div>
          <h1>欢迎回来</h1>
          <p>登录您的学习计划助手</p>
        `;
        form.innerHTML = `
          <div class="form-group">
            <label>邮箱</label>
            <div class="input-wrapper">
              <span class="icon">📧</span>
              <input type="email" name="email" required placeholder="请输入邮箱地址" class="input-field">
            </div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <div class="input-wrapper">
              <span class="icon">🔒</span>
              <input type="password" name="password" required placeholder="请输入密码" class="input-field">
              <button type="button" class="password-toggle" id="password-toggle">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">登录</button>
        `;
        toggleRegister.textContent = '立即注册';
        document.querySelector('.toggle-link p').textContent = '还没有账户？';
      } else {
        cardHeader.innerHTML = `
          <div class="logo">🎓</div>
          <h1>创建账户</h1>
          <p>开始您的学习之旅</p>
        `;
        form.innerHTML = `
          <div class="form-group">
            <label>用户名</label>
            <div class="input-wrapper">
              <span class="icon">👤</span>
              <input type="text" name="name" required placeholder="请输入用户名" class="input-field">
            </div>
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <div class="input-wrapper">
              <span class="icon">📧</span>
              <input type="email" name="email" required placeholder="请输入邮箱地址" class="input-field">
            </div>
          </div>
          <div class="form-group">
            <label>手机号（可选）</label>
            <div class="input-wrapper">
              <span class="icon">📱</span>
              <input type="tel" name="phone" placeholder="请输入手机号" class="input-field">
            </div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <div class="input-wrapper">
              <span class="icon">🔒</span>
              <input type="password" name="password" required placeholder="请输入密码" class="input-field">
              <button type="button" class="password-toggle" id="password-toggle">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">注册</button>
        `;
        toggleRegister.textContent = '立即登录';
        document.querySelector('.toggle-link p').textContent = '已有账户？';
      }
      setupPasswordToggle();
    });

    function setupPasswordToggle() {
      const newToggle = document.getElementById('password-toggle');
      const newPassword = document.querySelector('input[name="password"]');
      if (newToggle && newPassword) {
        newToggle.addEventListener('click', () => {
          const type = newPassword.type === 'password' ? 'text' : 'password';
          newPassword.type = type;
          newToggle.textContent = type === 'password' ? '👁️' : '🙈';
        });
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      btn.textContent = '处理中...';
      btn.disabled = true;
      errorMessage.style.display = 'none';

      const formData = new FormData(form);
      const data = Object.fromEntries(formData);

      try {
        const response = await fetch('http://localhost:5000/api/auth/' + (isLogin ? 'login' : 'register'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        if (response.ok) {
          localStorage.setItem('token', result.token);
          window.location.href = '/dashboard';
        } else {
          errorMessage.textContent = result.message || '操作失败';
          errorMessage.style.display = 'block';
        }
      } catch (err) {
        errorMessage.textContent = '网络连接失败，请稍后重试';
        errorMessage.style.display = 'block';
      } finally {
        btn.textContent = isLogin ? '登录' : '注册';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
